<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch vụ giúp việc uy tín</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
        }
        header {
            background: #0d6efd;
            color: white;
            padding: 20px;
            text-align: center;
        }
        section {
            padding: 20px;
        }
        .box {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
        }
        .btn {
            display: inline-block;
            padding: 10px 15px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<header>
    <h1>Dịch vụ giúp việc</h1>
    <p>Uy tín - Nhanh chóng - Giá hợp lý</p>
</header>

<section>
    <div class="box">
        <h2>Dịch vụ của chúng tôi</h2>
        <p>Cung cấp người giúp việc nhà, chăm em bé, chăm người già.</p>
    </div>

    <div class="box">
        <h2>Liên hệ ngay</h2>
        <p>Hotline: 0396358431</p>
        <a href="tel:0396358431" class="btn">Gọi ngay</a>
    </div>
</section>

</body>
</html>
