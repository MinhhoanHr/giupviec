<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
header{background:#0b3d91;color:white;padding:15px;text-align:center;}
.banner{
    background:url('https://69d8a0ebedd01a7285282b5c.imgix.net/logoo.jpg?auto=format&fit=fill&w=384') center/cover;
    height:280px;display:flex;align-items:center;justify-content:center;
}
.container{padding:20px;}
.box{
    background:white;padding:20px;margin-bottom:20px;
    border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
h2{color:#0b3d91;}
input,textarea,select{
    width:100%;padding:10px;margin-bottom:10px;
    border-radius:5px;border:1px solid #ccc;
}
button{
    background:#e53935;color:white;padding:12px;
    border:none;border-radius:6px;width:100%;cursor:pointer;
}
footer{background:#0b3d91;color:white;text-align:center;padding:15px;}
.zalo-btn{position:fixed;bottom:20px;right:20px;}

</head>

<body>

<header>
<h1>DỊCH VỤ GIÚP VIỆC UY TÍN</h1>
<p>Nhận người nhanh - Có mặt trong ngày</p>
<p>Minh Hoàn Hr</p>    
</header>

<div class="banner"></div>

<div class="container">

<div class="box">
<h2>📌 Dịch vụ</h2>
<ul>
<li>Giúp việc nhà theo giờ</li>
<li>Giúp việc ở lại</li>
<li>Chăm bé</li>
<li>Chăm ông bà</li>
<li>Chăm bệnh viện</li>
</ul>
</div>

<div class="box">
<h2>📩 Đăng ký ngay</h2>

<form id="formKhach">
<input name="ten" placeholder="Họ và tên" required>
<input name="sdt" placeholder="Số điện thoại" required>

<select name="dichvu" required>
<option value="">Chọn dịch vụ</option>
<option>Giúp việc</option>
<option>Chăm bé</option>
<option>Chăm ông bà</option>
</select>

<textarea name="nhucau" placeholder="Nhu cầu"></textarea>

<button type="submit">Gửi thông tin</button>
</form>

</div>

</div>

<footer>
📞 Hotline: 0396.358.431  
</footer>

<script>
document.getElementById("formKhach").addEventListener("submit", async function(e){
    e.preventDefault();

    const formData = new FormData(this);

    try{
        const res = await fetch("https://script.google.com/macros/s/AKfycbwfzyR__OeuxfrJ6L8JlAKSiZ-Os0lykT6J-Zf0nAu8zEtekra-RLP4Q7XToliw51l0/exec",{
            method:"POST",
            body:formData
        });

        const text = await res.text();

        if(text=="Success"){
            // 🔥 CHUYỂN TRANG
            window.location.href = "cam-on.html";
        }else{
            alert("Gửi thất bại!");
        }

    }catch(err){
        alert("Lỗi gửi form!");
        console.log(err);
    }
});
</script>

</body>
</html>
